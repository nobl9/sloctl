name: Release Docker Recovery
on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to check out.
        required: true
        type: string
        default: v0.23.0
      version:
        description: Docker semver tag to publish.
        required: true
        type: string
        default: 0.23.0
      shortSha:
        description: Short commit SHA suffix for the sha-* Docker tag.
        required: true
        type: string
        default: 5d90488
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.ref }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to Quay
        uses: docker/login-action@v4.2.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: |
            nobl9/sloctl
            quay.io/nobl9/sloctl
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=sha-${{ inputs.shortSha }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          push: true
          platforms: linux/amd64, linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: LDFLAGS=-s -w -X github.com/nobl9/sloctl/internal.BuildVersion=v${{ inputs.version }}
