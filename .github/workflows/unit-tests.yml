name: Unit tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Run tests
        run: make test/unit
  notification-platforms:
    name: Notification compatibility (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - name: Set up Bats
        id: setup-bats
        uses: bats-core/bats-action@4.0.0
        with:
          bats-version: 1.13.0
      - name: Run native platform notification tests
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: make test/bats/platform
  notification-windows:
    name: Notification compatibility (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Configure Git line endings
        run: git config --global core.autocrlf input
      - name: Check out code
        uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - name: Install Windows PTY dependency
        run: python -m pip install pywinpty==3.0.5
      - name: Set up Bats
        id: setup-bats
        uses: bats-core/bats-action@4.0.0
        with:
          bats-version: 1.13.0
      - name: Set up MinGW
        uses: msys2/setup-msys2@v2
        with:
          install: make python
          msystem: MINGW64
          path-type: inherit
          update: true
      - name: Run native platform notification tests
        shell: msys2 {0}
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: make test/bats/platform
